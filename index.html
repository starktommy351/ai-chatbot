<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans Bengali', sans-serif;
  background: #060a12;
  color: #eef2ff;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* HEADER */
.header {
  background: rgba(6,10,18,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.header-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, #00e5ff, #0099cc);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3em;
}
.header-info h1 {
  font-family: 'Syne', sans-serif;
  font-size: 1.1em; font-weight: 800;
  background: linear-gradient(135deg, #fff, #00e5ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-info p {
  font-size: 11px; color: rgba(238,242,255,0.4);
  margin-top: 1px;
}
.status {
  margin-left: auto;
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: rgba(238,242,255,0.5);
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%; background: #00e676;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:.5; transform:scale(1.3); }
}

/* CHAT BOX */
.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scroll-behavior: smooth;
}
.chat-box::-webkit-scrollbar { width: 4px; }
.chat-box::-webkit-scrollbar-track { background: transparent; }
.chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

/* MESSAGES */
.msg {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  animation: fadeIn .3s ease;
}
@keyframes fadeIn {
  from { opacity:0; transform:translateY(8px); }
  to { opacity:1; transform:translateY(0); }
}
.msg.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 34px; height: 34px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1em; flex-shrink: 0;
}
.msg.ai .msg-avatar { background: linear-gradient(135deg,#1a2035,#0d1525); border: 1px solid rgba(0,229,255,0.2); }
.msg.user .msg-avatar { background: linear-gradient(135deg,#00e5ff,#0099cc); }
.msg-bubble {
  max-width: 75%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.6;
}
.msg.ai .msg-bubble {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-top-left-radius: 4px;
}
.msg.user .msg-bubble {
  background: linear-gradient(135deg, #00e5ff22, #0099cc22);
  border: 1px solid rgba(0,229,255,0.25);
  border-top-right-radius: 4px;
  text-align: right;
}

/* TYPING */
.typing { display:flex; gap:5px; align-items:center; padding:4px 0; }
.typing span {
  width:7px; height:7px; border-radius:50%;
  background: #00e5ff; opacity:.4;
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay:.2s; }
.typing span:nth-child(3) { animation-delay:.4s; }
@keyframes bounce {
  0%,60%,100% { transform:translateY(0); opacity:.4; }
  30% { transform:translateY(-6px); opacity:1; }
}

/* WELCOME */
.welcome {
  text-align: center;
  padding: 40px 20px;
  color: rgba(238,242,255,0.3);
}
.welcome .big-icon { font-size: 3em; margin-bottom: 12px; }
.welcome h2 { font-family:'Syne',sans-serif; font-size:1.2em; color:rgba(238,242,255,0.6); margin-bottom:8px; }
.welcome p { font-size:13px; }

/* SUGGESTIONS */
.suggestions {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; margin-top: 20px;
}
.sug-btn {
  padding: 8px 14px;
  background: rgba(0,229,255,0.06);
  border: 1px solid rgba(0,229,255,0.15);
  border-radius: 100px;
  color: rgba(238,242,255,0.6);
  font-size: 12px; cursor: pointer;
  font-family: inherit;
  transition: all .2s;
}
.sug-btn:hover {
  background: rgba(0,229,255,0.12);
  border-color: rgba(0,229,255,0.3);
  color: #eef2ff;
}

/* INPUT AREA */
.input-area {
  padding: 12px 16px 20px;
  background: rgba(6,10,18,0.95);
  border-top: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 10px 14px;
  transition: border-color .2s, box-shadow .2s;
}
.input-row:focus-within {
  border-color: rgba(0,229,255,0.3);
  box-shadow: 0 0 0 3px rgba(0,229,255,0.06);
}
.input-row textarea {
  flex: 1; background: none; border: none; outline: none;
  color: #eef2ff; font-size: 14px;
  font-family: inherit; resize: none;
  max-height: 120px; min-height: 22px;
  line-height: 1.5;
}
.input-row textarea::placeholder { color: rgba(238,242,255,0.3); }
.send-btn {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #00e5ff, #0099cc);
  border: none; border-radius: 10px;
  color: #000; font-size: 1.1em;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .2s, transform .1s;
}
.send-btn:hover { opacity: .85; }
.send-btn:active { transform: scale(.95); }
.send-btn:disabled { opacity: .4; cursor: not-allowed; }
.input-hint {
  text-align: center; font-size: 11px;
  color: rgba(238,242,255,0.2); margin-top: 8px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-icon">🤖</div>
  <div class="header-info">
    <h1>Claude AI Chat</h1>
    <p>Powered by Anthropic Claude</p>
  </div>
  <div class="status">
    <div class="status-dot"></div>
    Online
  </div>
</div>

<!-- CHAT BOX -->
<div class="chat-box" id="chatBox">
  <div class="welcome" id="welcome">
    <div class="big-icon">✨</div>
    <h2>আমি Claude AI</h2>
    <p>যেকোনো প্রশ্ন করুন — বাংলায় উত্তর পাবেন</p>
    <div class="suggestions">
      <button class="sug-btn" onclick="quickSend('বাংলাদেশ সম্পর্কে কিছু বলো')">🇧🇩 বাংলাদেশ</button>
      <button class="sug-btn" onclick="quickSend('AI কী জিনিস সহজে বোঝাও')">🧠 AI কী?</button>
      <button class="sug-btn" onclick="quickSend('আজকের দিনটা কেমন কাটাবো টিপস দাও')">💡 টিপস</button>
      <button class="sug-btn" onclick="quickSend('একটা মজার গল্প বলো')">📖 গল্প</button>
    </div>
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-row">
    <textarea id="chatInput" placeholder="প্রশ্ন লিখুন..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
  </div>
  <div class="input-hint">Enter চাপুন অথবা ➤ বাটন চাপুন</div>
</div>

<script>
const API_KEY = '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';
const chatBox = document.getElementById('chatBox');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const conversationHistory = [];

// Auto resize textarea
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = chatInput.scrollHeight + 'px';
});

// Enter to send
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
});

function quickSend(text) {
  chatInput.value = text;
  sendMsg();
}

async function sendMsg() {
  const msg = chatInput.value.trim();
  if (!msg || sendBtn.disabled) return;

  // Hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  addMsg(msg, 'user');
  conversationHistory.push({ role: 'user', content: msg });

  chatInput.value = '';
  chatInput.style.height = 'auto';
  sendBtn.disabled = true;

  const typingEl = addTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        system: 'তুমি একটি বাংলা AI সহকারী। সবসময় বাংলায় উত্তর দাও। সংক্ষিপ্ত, সহায়ক ও বন্ধুত্বপূর্ণ থাকো।',
        messages: conversationHistory
      })
    });

    const data = await res.json();
    typingEl.remove();

    if (data?.error) {
      addMsg('❌ Error: ' + data.error.message, 'ai');
    } else {
      const reply = data?.content?.[0]?.text || 'দুঃখিত, উত্তর পাওয়া যায়নি।';
      conversationHistory.push({ role: 'assistant', content: reply });
      addMsg(reply, 'ai');
    }
  } catch(e) {
    typingEl.remove();
    addMsg('❌ সংযোগ সমস্যা: ' + e.message, 'ai');
  }

  sendBtn.disabled = false;
  chatInput.focus();
}

function addMsg(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'ai' ? '🤖' : '👤'}</div>
    <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
  `;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
  return div;
}
</script>
</body>
</html>
